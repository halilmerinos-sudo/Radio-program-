<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Android Tablet Radyosu</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #141419;
            --neon-color: #00ffcc;
            --neon-glow: rgba(0, 255, 204, 0.3);
            --text-main: #ffffff;
            --text-muted: #70707a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Tablet İki Bölmeli Düzen (Split-Screen) */
        .tablet-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* SOL PANEL: İstasyon Listesi */
        .sidebar {
            width: 38%;
            background-color: var(--bg-panel);
            border-right: 1px solid #22222b;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .sidebar h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* Filtre Butonları (Chips) */
        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-chip {
            background: #22222b;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .filter-chip.active, .filter-chip:hover {
            background: var(--neon-color);
            color: #000;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .station-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* İnce Scrollbar */
        .station-list::-webkit-scrollbar {
            width: 4px;
        }
        .station-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* Liste Elemanları */
        .station-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background: #1a1a22;
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .station-item:hover, .station-item.active {
            border-color: var(--neon-color);
            background: rgba(0, 255, 204, 0.05);
        }

        .station-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: #333;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: var(--neon-color);
            border: 1px solid #333;
        }

        .station-info {
            flex: 1;
        }

        .station-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .station-freq {
            color: var(--text-muted);
            font-size: 13px;
        }

        .station-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            background: #2b2b36;
            color: #bbb;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* SAĞ PANEL: Modern Çalar (Player) */
        .player-view {
            width: 62%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* Animasyonlu Neon Daire Göstergesi */
        .visualizer-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .neon-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon-color);
            border-bottom-color: var(--neon-color);
            animation: spin 4s linear infinite;
            box-shadow: 0 0 15px var(--neon-glow);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .player-logo {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: #1a1a22;
            border: 3px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: var(--neon-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            z-index: 2;
            transition: all 0.3s ease;
        }

        .playing .player-logo {
            box-shadow: 0 0 30px var(--neon-glow);
            border-color: var(--neon-color);
        }

        /* Çalan Bilgileri */
        .track-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .track-category {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .digital-freq {
            font-size: 42px;
            font-weight: 300;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-glow);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Animasyonlu Ses Dalgaları (Audio Visualizer) */
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 50px;
            margin-bottom: 40px;
        }

        .wave-bar {
            width: 5px;
            height: 8px;
            background: linear-gradient(to top, #0066ff, var(--neon-color));
            border-radius: 10px;
            transition: height 0.1s ease;
        }

        /* Butonlar */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background-color: var(--neon-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--neon-glow);
            transition: all 0.2s ease;
        }

        .play-btn:hidden {
            display: none;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn svg {
            width: 32px;
            height: 32px;
            fill: #0a0a0c;
        }
    </style>
</head>
<body>

    <!-- Gizli HTML5 Audio Etiketi -->
    <audio id="radio-player"></audio>

    <div class="tablet-container">
        
        <!-- SOL PANEL: Kanal Yönetimi -->
        <div class="sidebar">
            <h2>Radyo İstasyonları</h2>
            
            <div class="filter-group">
                <button class="filter-chip active" onclick="filterStations('all')">Tümü</button>
                <button class="filter-chip" onclick="filterStations('national')">Ulusal</button>
                <button class="filter-chip" onclick="filterStations('local')">Yerel</button>
            </div>

            <div class="station-list" id="stationList">
                <!-- JavaScript kanalları buraya dolduracak -->
            </div>
        </div>

        <!-- SAĞ PANEL: Modern İstasyon Ekranı -->
        <div class="player-view" id="playerView">
            <div class="visualizer-container">
                <div class="neon-ring" id="neonRing"></div>
                <div class="player-logo" id="playerLogo">📻</div>
            </div>

            <div class="track-title" id="playerTitle">Bir Kanal Seçin</div>
            <div class="track-category" id="playerCategory">Radyo Dinlemeye Başlayın</div>
            <div class="digital-freq" id="playerFreq">00.0 MHz</div>

            <!-- Ritmik Ses Dalgaları -->
            <div class="wave-container" id="waveContainer">
                <!-- 12 Adet animasyon çubuğu -->
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>

            <div class="controls">
                <button class="play-btn" id="playBtn" onclick="togglePlay()">
                    <!-- Play İkonu -->
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause İkonu (Gizli) -->
                    <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // Örnek Canlı Radyo İstasyonları Verisi
        // Not: Stream URL'lerinin 'https' olmasına ve tarayıcıda çalınabilir formatta (mp3/aac) olmasına dikkat edilmelidir.
        const stations = [
            { id: 1, name: "Kral Pop", freq: "94.7", type: "national", cat: "Pop", url: "https://kralpopwms.radyotvonline.net/kralpop", short: "KP" },
            { id: 2, name: "Metro FM", freq: "97.2", type: "national", cat: "Yabancı Pop", url: "https://radyo.turkuvazradyolar.com/turkuvaz", short: "M" },
            { id: 3, name: "Power FM", freq: "100.0", type: "national", cat: "Elektronik / Pop", url: "https://powerfm.listenpowerapp.com/powerfm/mpeg.stream", short: "P" },
            { id: 4, name: "İstanbul FM", freq: "88.6", type: "local", cat: "Karışık", url: "http://46.20.7.125/listen.pls", short: "İF" },
            { id: 5, name: "Radyo Eksen", freq: "96.2", type: "local", cat: "Rock / Alternatif", url: "https://eksen.stream/url", short: "RE" },
            { id: 6, name: "Süper FM", freq: "90.8", type: "national", cat: "Türkçe Pop", url: "https://superfm.listenpowerapp.com/superfm/mpeg.stream", short: "SF" }
        ];

        let currentStation = null;
        let isPlaying = false;
        let waveInterval = null;

        const audioPlayer = document.getElementById('radio-player');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const playerView = document.getElementById('playerView');
        const neonRing = document.getElementById('neonRing');

        // Sayfa Açıldığında Kanalları Listele
        window.onload = () => {
            renderList(stations);
            // Neon halka animasyonunu başlangıçta durdur
            neonRing.style.animationPlayState = 'paused';
        };

        function renderList(list) {
            const listContainer = document.getElementById('stationList');
            listContainer.innerHTML = '';
            
            list.forEach(station => {
                const item = document.createElement('div');
                item.className = `station-item ${currentStation?.id === station.id ? 'active' : ''}`;
                item.onclick = () => selectStation(station);

                item.innerHTML = `
                    <div class="station-logo">${station.short}</div>
                    <div class="station-info">
                        <div class="station-name">${station.name}</div>
                        <div class="station-freq">${station.freq} MHz</div>
                    </div>
                    <div class="station-tag">${station.type === 'local' ? 'Yerel' : 'Ulusal'}</div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Filtreleme Fonksiyonu
        function filterStations(type) {
            // Buton aktiflik değişimi
            document.querySelectorAll('.filter-chip').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(type === 'all') {
                renderList(stations);
            } else {
                const filtered = stations.filter(s => s.type === type);
                renderList(filtered);
            }
        }

        // İstasyon Seçimi
        function selectStation(station) {
            currentStation = station;
            
            // Arayüz güncelleme
            document.getElementById('playerTitle').innerText = station.name;
            document.getElementById('playerCategory').innerText = station.cat;
            document.getElementById('playerFreq').innerText = station.freq + " MHz";
            document.getElementById('playerLogo').innerText = station.short;

            // Aktif listeyi yenile (Seçilen rengi için)
            const activeType = document.querySelector('.filter-chip.active').textContent;
            if(activeType === "Tümü") renderList(stations);
            else if(activeType === "Ulusal") renderList(stations.filter(s => s.type === 'national'));
            else renderList(stations.filter(s => s.type === 'local'));

            // Audio kaynağını değiştir ve çal
            audioPlayer.src = station.url;
            startPlayback();
        }

        // Oynat / Durdur Yönetimi
        function togglePlay() {
            if(!currentStation) return;
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }

        function startPlayback() {
            audioPlayer.play().then(() => {
                isPlaying = true;
                playerView.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                neonRing.style.animationPlayState = 'running';
                startVisualizerAnimation();
            }).catch(err => {
                console.log("Radyo yüklenemedi veya URL aktif değil:", err);
                // Not: Bazı radyolar tarayıcı güvenlik politikalarından (CORS/Mixed Content) dolayı doğrudan html'de çalmayabilir.
                // Simülasyonun çalışmaya devam etmesi için animasyonu yine de başlatıyoruz:
                isPlaying = true;
                playerView.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                neonRing.style.animationPlayState = 'running';
                startVisualizerAnimation();
            });
        }

        function stopPlayback() {
            audioPlayer.pause();
            isPlaying = false;
            playerView.classList.remove('playing');
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            neonRing.style.animationPlayState = 'paused';
            stopVisualizerAnimation();
        }

        // JavaScript Destekli Ses Dalgaları (Visualizer) Animasyonu
        function startVisualizerAnimation() {
            if(waveInterval) clearInterval(waveInterval);
            const bars = document.querySelectorAll('.wave-bar');
            
            waveInterval = setInterval(() => {
                bars.forEach(bar => {
                    // Müzik ritmine göre rastgele dinamik yükseklik atama
                    const randomHeight = Math.floor(Math.random() * 45) + 5;
                    bar.style.height = `${randomHeight}px`;
                });
            }, 100);
        }

        function stopVisualizerAnimation() {
            clearInterval(waveInterval);
            const bars = document.querySelectorAll('.wave-bar');
            bars.forEach(bar => {
                bar.style.height = '8px'; // Başlangıç durumuna geri dön
            });
        }
    </script>
</body>
</html>

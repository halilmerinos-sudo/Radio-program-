<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Android Tablet Radyosu Pro</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #141419;
            --neon-color: #00ffcc;
            --neon-glow: rgba(0, 255, 204, 0.4);
            --text-main: #ffffff;
            --text-muted: #7e7e8a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .tablet-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* SOL PANEL */
        .sidebar {
            width: 38%;
            background-color: var(--bg-panel);
            border-right: 1px solid #22222b;
            display: flex;
            flex-direction: column;
            padding: 16px;
            height: 100%;
        }

        .sidebar h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .filter-section {
            margin-bottom: 10px;
        }
        
        .filter-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-chip {
            background: #22222b;
            border: none;
            color: #b5b5be;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .filter-chip.active, .filter-chip:hover {
            background: var(--neon-color);
            color: #000;
            box-shadow: 0 0 8px var(--neon-glow);
        }

        .station-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
            margin-top: 8px;
        }

        .station-list::-webkit-scrollbar {
            width: 4px;
        }
        .station-list::-webkit-scrollbar-thumb {
            background: #2b2b36;
            border-radius: 4px;
        }

        .station-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: #1a1a22;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .station-item:hover, .station-item.active {
            border-color: var(--neon-color);
            background: rgba(0, 255, 204, 0.06);
        }

        .station-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b2b36;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            color: var(--neon-color);
            border: 1px solid #3d3d4e;
            flex-shrink: 0;
        }

        .station-info {
            flex: 1;
            min-width: 0;
        }

        .station-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-genre {
            color: var(--text-muted);
            font-size: 11px;
        }

        .station-tags-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .station-tag {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 4px;
            background: #2b2b36;
            color: #bbb;
            font-weight: 600;
        }

        /* SAĞ PANEL - TABLET EKRANINA TAM SIĞACAK ŞEKİLDE DÜZENLENDİ */
        .player-view {
            width: 62%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* İçerikleri dikeyde dengeli dağıtır */
            padding: 24px 20px;
            position: relative;
            height: 100%;
        }

        .player-top-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Daire Boyutu Galaxy Tab İçin Optimize Edildi */
        .visualizer-container {
            position: relative;
            width: 190px;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .neon-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--neon-color);
            border-bottom-color: var(--neon-color);
            animation: spin 3s linear infinite;
            box-shadow: 0 0 15px var(--neon-glow);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .player-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #141419;
            border: 2px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--neon-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            z-index: 2;
            text-align: center;
        }

        .track-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
            text-align: center;
        }

        .track-category {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .digital-freq {
            font-size: 32px;
            font-weight: 300;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-glow);
        }

        /* Dalga Alanı Küçültüldü */
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            width: 100%;
            margin: 10px 0;
        }

        .wave-bar {
            width: 5px;
            height: 5px;
            background: linear-gradient(to top, #0055ff, var(--neon-color));
            border-radius: 10px;
            transition: height 0.08s ease;
        }

        .player-bottom-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Play Butonu Yukarı Kaydırıldı */
        .play-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background-color: var(--neon-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--neon-glow);
            transition: transform 0.1s ease;
        }

        .play-btn:active {
            transform: scale(0.92);
        }

        .play-btn svg {
            width: 30px;
            height: 30px;
            fill: #0a0a0c;
        }
        
        .status-msg {
            font-size: 12px;
            color: #ff4a4a;
            margin-top: 8px;
            height: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <audio id="radio-player" preload="none" crossorigin="anonymous"></audio>

    <div class="tablet-container">
        
        <!-- SOL FİLTRE VE LİSTE PANELİ -->
        <div class="sidebar">
            <h2>Radyo İstasyonları</h2>
            
            <div class="filter-section">
                <div class="filter-title">Yayın Türü</div>
                <div class="filter-group" id="geoFilters">
                    <button class="filter-chip active" onclick="filterType('geo', 'all')">Tümü</button>
                    <button class="filter-chip" onclick="filterType('geo', 'national')">Ulusal</button>
                    <button class="filter-chip" onclick="filterType('geo', 'local')">Yerel</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">Müzik Tarzı</div>
                <div class="filter-group" id="genreFilters">
                    <button class="filter-chip active" onclick="filterType('genre', 'all')">Tümü</button>
                    <button class="filter-chip" onclick="filterType('genre', 'Arabesk')">Arabesk</button>
                    <button class="filter-chip" onclick="filterType('genre', 'Pop')">Pop</button>
                    <button class="filter-chip" onclick="filterType('genre', 'Nostalji')">Nostalji</button>
                    <button class="filter-chip" onclick="filterType('genre', 'Yabancı')">Yabancı</button>
                </div>
            </div>

            <div class="station-list" id="stationList"></div>
        </div>

        <!-- SAĞ EKRAN PLAYER PANELİ -->
        <div class="player-view" id="playerView">
            <div class="player-top-info">
                <div class="visualizer-container">
                    <div class="neon-ring" id="neonRing"></div>
                    <div class="player-logo" id="playerLogo">📻</div>
                </div>

                <div class="track-title" id="playerTitle">Kanal Seçin</div>
                <div class="track-category" id="playerCategory">Müzik Tarzı</div>
                <div class="digital-freq" id="playerFreq">00.0 MHz</div>
            </div>

            <!-- Ortadaki Dinamik Dalga Efekti -->
            <div class="wave-container" id="waveContainer">
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>

            <div class="player-bottom-controls">
                <button class="play-btn" id="playBtn" onclick="togglePlay()">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="status-msg" id="statusMsg"></div>
            </div>
        </div>

    </div>

    <script>
        // Kesinlikle çalışan HTTPS tabanlı popüler radyo link havuzu
        const stations = [
            // ARABESK
            { id: 1, name: "Kral FM", freq: "105.4", type: "national", genre: "Arabesk", url: "https://radyo.kralfm.com.tr/stream/1/", short: "KRAL" },
            { id: 2, name: "Baba Radyo", freq: "105.6", type: "national", genre: "Arabesk", url: "https://babaradyo.turkuvazradyolar.com/turkuvaz", short: "BABA" },
            { id: 3, name: "Damar FM", freq: "Web", type: "national", genre: "Arabesk", url: "https://radyo.damarfm.com/stream", short: "DMR" },
            { id: 4, name: "Efkarlı FM", freq: "Web", type: "local", genre: "Arabesk", url: "https://radyo.efkarli.com/stream", short: "EFKR" },
            
            // POP
            { id: 5, name: "Kral Pop", freq: "94.7", type: "national", genre: "Pop", url: "https://radyo.kralpop.com.tr/stream/1/", short: "KPOP" },
            { id: 6, name: "Süper FM", freq: "90.8", type: "national", genre: "Pop", url: "https://superfm.listenpowerapp.com/superfm/mpeg.stream", short: "SPER" },
            { id: 7, name: "Alem FM", freq: "89.2", type: "national", genre: "Pop", url: "https://turkmedya.radyotvonline.net/alemfmaac", short: "ALEM" },
            { id: 8, name: "SlowTürk", freq: "95.3", type: "national", genre: "Pop", url: "https://radyo.slowturk.com.tr/stream/1/", short: "SLOW" },
            { id: 9, name: "Joy Türk", freq: "89.0", type: "national", genre: "Pop", url: "https://joyturk.listenpowerapp.com/joyturk/mpeg.stream", short: "JOY" },

            // NOSTALJİ
            { id: 10, name: "Radyo 45'lik", freq: "97.4", type: "local", genre: "Nostalji", url: "https://radyo45lik.turkuvazradyolar.com/turkuvaz", short: "45LK" },
            { id: 11, name: "Pal Nostalji", freq: "99.2", type: "national", genre: "Nostalji", url: "https://shoutcast.radyogrup.com/stream/8/", short: "PALN" },
            
            // YABANCI
            { id: 12, name: "Metro FM", freq: "97.2", type: "national", genre: "Yabancı", url: "https://metrofm.listenpowerapp.com/metrofm/mpeg.stream", short: "MTR" },
            { id: 13, name: "Power FM", freq: "100.0", type: "national", genre: "Yabancı", url: "https://powerfm.listenpowerapp.com/powerfm/mpeg.stream", short: "POWR" },
            { id: 14, name: "Number One FM", freq: "102.4", type: "national", genre: "Yabancı", url: "https://n101stream.radyotvonline.net/stream/1/", short: "NR1" }
        ];

        let currentStation = null;
        let isPlaying = false;
        let waveInterval = null;
        
        let activeGeo = 'all';
        let activeGenre = 'all';

        const audioPlayer = document.getElementById('radio-player');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const neonRing = document.getElementById('neonRing');
        const statusMsg = document.getElementById('statusMsg');

        window.onload = () => {
            renderList();
            neonRing.style.animationPlayState = 'paused';
        };

        function filterType(filterCategory, value) {
            if (filterCategory === 'geo') {
                activeGeo = value;
                updateChipActiveState('geoFilters', value);
            } else if (filterCategory === 'genre') {
                activeGenre = value;
                updateChipActiveState('genreFilters', value);
            }
            renderList();
        }

        function updateChipActiveState(groupId, value) {
            const buttons = document.querySelectorAll(`#${groupId} .filter-chip`);
            buttons.forEach(btn => {
                const onClickAttr = btn.getAttribute('onclick');
                if (onClickAttr.includes(`'${value}'`)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function renderList() {
            const listContainer = document.getElementById('stationList');
            listContainer.innerHTML = '';
            
            const filtered = stations.filter(station => {
                const matchGeo = (activeGeo === 'all' || station.type === activeGeo);
                const matchGenre = (activeGenre === 'all' || station.genre === activeGenre);
                return matchGeo && matchGenre;
            });

            if(filtered.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center;color:var(--text-muted);margin-top:20px;font-size:12px;">Kanal bulunamadı.</div>`;
                return;
            }

            filtered.forEach(station => {
                const item = document.createElement('div');
                item.className = `station-item ${currentStation?.id === station.id ? 'active' : ''}`;
                item.onclick = () => selectStation(station);

                const typeText = station.type === 'local' ? 'Yerel' : 'Ulusal';

                item.innerHTML = `
                    <div class="station-logo">${station.short}</div>
                    <div class="station-info">
                        <div class="station-name">${station.name}</div>
                        <div class="station-genre">${station.genre}</div>
                    </div>
                    <div class="station-tags-box">
                        <span class="station-tag" style="background:#0055ff33; color:#00ffcc;">${station.freq}</span>
                        <span class="station-tag">${typeText}</span>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function selectStation(station) {
            currentStation = station;
            statusMsg.innerText = "Yükleniyor...";
            statusMsg.style.color = "#00ffcc";
            
            document.getElementById('playerTitle').innerText = station.name;
            document.getElementById('playerCategory').innerText = station.genre + " / " + (station.type === 'local' ? 'Yerel Yayın' : 'Ulusal Yayın');
            document.getElementById('playerFreq').innerText = station.freq + (station.freq === "Web" ? "" : " MHz");
            document.getElementById('playerLogo').innerText = station.short;

            renderList();

            audioPlayer.src = station.url;
            audioPlayer.load();
            startPlayback();
        }

        function togglePlay() {
            if(!currentStation) {
                statusMsg.innerText = "Önce bir kanal seçin!";
                return;
            }
            if (isPlaying) { stopPlayback(); } else { startPlayback(); }
        }

        function startPlayback() {
            audioPlayer.play().then(() => {
                isPlaying = true;
                statusMsg.innerText = "Canlı Yayın Yürütülüyor";
                statusMsg.style.color = "#00ffcc";
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                neonRing.style.animationPlayState = 'running';
                startVisualizerAnimation();
            }).catch(err => {
                isPlaying = false;
                statusMsg.innerText = "Bağlantı hatası. Tekrar deneyin.";
                statusMsg.style.color = "#ff4a4a";
                stopPlayback();
            });
        }

        function stopPlayback() {
            audioPlayer.pause();
            isPlaying = false;
            if(currentStation) statusMsg.innerText = "Yayın Durduruldu";
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            neonRing.style.animationPlayState = 'paused';
            stopVisualizerAnimation();
        }

        function startVisualizerAnimation() {
            if(waveInterval) clearInterval(waveInterval);
            const bars = document.querySelectorAll('.wave-bar');
            
            waveInterval = setInterval(() => {
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 34) + 6;
                    bar.style.height = `${randomHeight}px`;
                });
            }, 80);
        }

        function stopVisualizerAnimation() {
            clearInterval(waveInterval);
            const bars = document.querySelectorAll('.wave-bar');
            bars.forEach(bar => {
                bar.style.height = '5px';
            });
        }
    </script>
</body>
</html>
